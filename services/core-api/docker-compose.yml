services:
  core-api:
    build:
      context: ../..
      dockerfile: services/core-api/Dockerfile
      args:
        WHISPER_CPP_VERSION: ${JARVIS_WHISPER_CPP_VERSION:-v1.8.1}
        WHISPER_CPP_MODEL: ${JARVIS_WHISPER_CPP_MODEL:-base.en}
    env_file:
      - .env.template
    environment:
      JARVIS_API_BEARER_TOKEN: ${JARVIS_API_BEARER_TOKEN:-change-me}
      JARVIS_STT_PROVIDER: ${JARVIS_STT_PROVIDER:-fake}
      JARVIS_WHISPER_CPP_BINARY_PATH: ${JARVIS_WHISPER_CPP_BINARY_PATH:-/opt/whisper.cpp/build/bin/whisper-cli}
      JARVIS_WHISPER_CPP_MODEL_PATH: ${JARVIS_WHISPER_CPP_MODEL_PATH:-/opt/whisper.cpp/models/ggml-base.en.bin}
      JARVIS_WHISPER_CPP_THREADS: ${JARVIS_WHISPER_CPP_THREADS:-4}
      JARVIS_TRANSCRIPTION_TIMEOUT_SECONDS: ${JARVIS_TRANSCRIPTION_TIMEOUT_SECONDS:-120}
      JARVIS_TEMP_AUDIO_DIR: ${JARVIS_TEMP_AUDIO_DIR:-/tmp/jarvis-audio}
      JARVIS_BACKEND_LOG_DIR: ${JARVIS_BACKEND_LOG_DIR:-/var/log/jarvis/backend}
    ports:
      - "${JARVIS_CORE_API_HOST_PORT:-8010}:8000"
    volumes:
      - ../../.artifacts/logs/backend:/var/log/jarvis/backend
